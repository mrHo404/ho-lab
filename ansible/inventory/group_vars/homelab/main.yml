---
# ho-lab global variables — safe to commit (no secrets)

ho_lab_root: /opt/ho-lab
ho_lab_compose_root: "{{ ho_lab_root }}/compose"
ho_lab_uid: 1000
ho_lab_gid: 1000
ho_lab_timezone: Europe/Berlin  # CHANGE ME

# OS target: debian | ubuntu | fedora
ho_lab_os: debian

# Storage — see docs/STORAGE.md before enabling
storage_enabled: false
storage_confirm_destroy: false
zfs_pool_name: tank
zfs_drives: []  # e.g. ["/dev/sdb", "/dev/sdc", "/dev/sdd", "/dev/sde"]

# ZFS mount paths
zfs_media_path: "/{{ zfs_pool_name }}/media"
zfs_photos_path: "/{{ zfs_pool_name }}/photos"
zfs_downloads_path: "/{{ zfs_pool_name }}/downloads"
zfs_minecraft_path: "/{{ zfs_pool_name }}/minecraft"

# --- Container image pins ---
images:
  jellyfin: "jellyfin/jellyfin:10.10.7"
  immich_server: "ghcr.io/immich-app/immich-server:release"
  immich_ml: "ghcr.io/immich-app/immich-machine-learning:release"
  postgres: "tensorchord/pgvecto-rs:pg16-v0.3.0"
  redis: "redis:7.4-alpine"
  pihole: "pihole/pihole:2025.03.0"
  gluetun: "qmcgaw/gluetun:v3.39.0"
  qbittorrent: "lscr.io/linuxserver/qbittorrent:5.0.4"
  uptime_kuma: "louislam/uptime-kuma:1.23.16"
  prometheus: "prom/prometheus:v3.2.1"
  grafana: "grafana/grafana:11.5.2"
  node_exporter: "prom/node-exporter:v1.9.0"
  cadvisor: "gcr.io/cadvisor/cadvisor:v0.51.0"
  minecraft: "itzg/minecraft-server:java21"

# --- Feature flags ---
services:
  pihole: true
  jellyfin: true
  immich: true
  gluetun_qbittorrent: true
  monitoring: true
  minecraft: false  # enable when ready — see docs/MINECRAFT.md

# --- Pi-hole ---
pihole:
  web_port: 8080
  dns_port: 53
  upstream_dns:
    - "1.1.1.1"
    - "1.0.0.1"
  local_dns: "holab.lan"

# --- Jellyfin ---
jellyfin:
  port: 8096
  published_url: "http://{{ ansible_host }}:8096"
  hardware_accel: false  # set true after GPU installed
  render_gid: 109
  video_gid: 44

# --- Immich ---
immich:
  port: 2283
  library_path: "{{ zfs_photos_path }}"

# --- Gluetun / qBittorrent ---
vpn:
  provider: protonvpn  # protonvpn | nordvpn
  type: wireguard       # wireguard | openvpn
  port_forwarding: true
  server_countries: "Netherlands"

gluetun:
  qbittorrent_webui_port: 8080
  qbittorrent_torrent_port: 6881
  lan_subnets: "192.168.1.0/24"  # CHANGE ME

# --- Monitoring ---
monitoring:
  grafana_port: 3000
  prometheus_port: 9090
  uptime_kuma_port: 3001
  cadvisor_port: 8081
  retention: 30d

# --- Minecraft ---
# See docs/MINECRAFT.md for mod loader guide and RAM budgeting
minecraft:
  base_path: "{{ zfs_minecraft_path }}"

# Define one or more servers; set enabled: true to deploy
minecraft_servers:
  # RECOMMENDED: vanilla clients, server-side perf mods, great for redstone/farms
  - name: vanilla-perf
    enabled: false
    port: 25565
    type: FABRIC
    version: LATEST
    memory: 8G
    memory_limit: 10G
    max_players: 10
    difficulty: normal
    gamemode: survival
    motd: "ho-lab · vanilla+perf"
    use_aikar_flags: true
    view_distance: 10
    simulation_distance: 8
    max_tick_time: -1
    online_mode: true
    version_from_modrinth: true
    modrinth_projects:
      - lithium              # game logic: physics, mob AI, block ticks — vanilla clients OK
      - ferrite-core         # RAM reduction for large worlds
      - c2me-fabric          # faster chunk IO — helps complex loaded areas
      - clumps               # merges XP orbs — essential for mob farms
      - server-core          # extra tick/entity optimizations
    # whitelist: "player1,player2"
    # ops: "your_username"

  # Alternative: Paper fork — best raw TPS for redstone; tiny vanilla behavior diffs
  - name: paper-perf
    enabled: false
    port: 25566
    type: PURPUR
    version: LATEST
    memory: 8G
    memory_limit: 10G
    max_players: 10
    difficulty: normal
    gamemode: survival
    motd: "ho-lab · paper perf"
    use_aikar_flags: true
    view_distance: 10
    simulation_distance: 8
    online_mode: true
    extra_env:
      PAPER_WATCHDOG__TIMEOUT: "120"

  # Optional: add Create mod for mechanical complexity (clients need matching mods)
  - name: create
    enabled: false
    port: 25567
    type: FABRIC
    version: "1.21.1"
    memory: 10G
    memory_limit: 12G
    max_players: 6
    version_from_modrinth: true
    modrinth_projects:
      - fabric-api
      - create
      - jei
      - lithium
      - ferrite-core

  - name: survival
    enabled: false
    port: 25568
    type: PAPER
    version: LATEST
    memory: 4G
    memory_limit: 5G
    max_players: 10
    difficulty: normal
    gamemode: survival
    motd: "ho-lab survival"
    use_aikar_flags: true
    online_mode: true

  - name: modded
    enabled: false
    port: 25569
    type: NEOFORGE
    version: "1.21.1"
    memory: 10G
    memory_limit: 12G
    max_players: 6
    modrinth_projects: []

# Load secrets from vault (create from vault.yml.example)
# vault_* variables are defined in group_vars/homelab/vault.yml
