---
# Full site deploy — all enabled services
- name: Deploy ho-lab services
  hosts: homelab
  gather_facts: true

  pre_tasks:
    - name: Ensure ho-lab root directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ ho_lab_uid }}"
        group: "{{ ho_lab_gid }}"
        mode: "0755"
      loop:
        - "{{ ho_lab_root }}"
        - "{{ ho_lab_compose_root }}"

  roles:
    - role: pihole
      when: services.pihole | default(false)
      tags: [pihole, network]

    - role: jellyfin
      when: services.jellyfin | default(false)
      tags: [jellyfin, media]

    - role: immich
      when: services.immich | default(false)
      tags: [immich, media]

    - role: gluetun_qbittorrent
      when: services.gluetun_qbittorrent | default(false)
      tags: [gluetun, qbittorrent, downloads]

    - role: monitoring
      when: services.monitoring | default(false)
      tags: [monitoring]

  post_tasks:
    - name: Display service URLs
      ansible.builtin.debug:
        msg:
          - "Jellyfin:     http://{{ ansible_host }}:{{ jellyfin.port }}"
          - "Immich:       http://{{ ansible_host }}:{{ immich.port }}"
          - "Pi-hole:      http://{{ ansible_host }}:{{ pihole.web_port }}/admin"
          - "qBittorrent:  http://{{ ansible_host }}:{{ gluetun.qbittorrent_webui_port }}"
          - "Uptime Kuma:  http://{{ ansible_host }}:{{ monitoring.uptime_kuma_port }}"
          - "Grafana:      http://{{ ansible_host }}:{{ monitoring.grafana_port }}"
