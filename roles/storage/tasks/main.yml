---
- name: Abort if storage not explicitly confirmed
  ansible.builtin.fail:
    msg: >
      Storage playbook is DESTRUCTIVE. Set storage_enabled: true AND
      storage_confirm_destroy: true in group_vars after reading docs/STORAGE.md.
      Also set zfs_drives to your 4 data drive paths.
  when: not storage_enabled | default(false) or not storage_confirm_destroy | default(false)

- name: Abort if no drives specified
  ansible.builtin.fail:
    msg: "Set zfs_drives in group_vars/homelab/vars.yml (e.g. ['/dev/sdb', ...])"
  when: zfs_drives | length == 0

- name: Install ZFS utilities (Debian/Ubuntu)
  ansible.builtin.apt:
    name:
      - zfsutils-linux
      - zfs-dkms
    state: present
  when: ho_lab_os in ['debian', 'ubuntu']

- name: Install ZFS utilities (Fedora)
  ansible.builtin.dnf:
    name:
      - zfs
      - kernel-devel
    state: present
  when: ho_lab_os == 'fedora'

- name: Check if pool already exists
  ansible.builtin.command: "zpool list {{ zfs_pool_name }}"
  register: zpool_check
  changed_when: false
  failed_when: false

- name: Create ZFS RAIDZ1 pool
  ansible.builtin.command: >
    zpool create -f -o ashift=12
    -O compression=lz4
    -O atime=off
    -O xattr=sa
    -O acltype=posixacl
    {{ zfs_pool_name }} raidz1 {{ zfs_drives | join(' ') }}
  when: zpool_check.rc != 0

- name: Create ZFS datasets
  ansible.builtin.command: "zfs create {{ item }}"
  loop:
    - "{{ zfs_pool_name }}/media"
    - "{{ zfs_pool_name }}/media/movies"
    - "{{ zfs_pool_name }}/media/tv"
    - "{{ zfs_pool_name }}/photos"
    - "{{ zfs_pool_name }}/downloads"
    - "{{ zfs_pool_name }}/backups"
    - "{{ zfs_pool_name }}/minecraft"
  register: zfs_create
  changed_when: zfs_create.rc == 0
  failed_when: zfs_create.rc != 0 and 'dataset already exists' not in zfs_create.stderr

- name: Set recordsize for media datasets
  ansible.builtin.command: "zfs set recordsize=1M {{ zfs_pool_name }}/media"
  changed_when: false

- name: Set recordsize for photos dataset
  ansible.builtin.command: "zfs set recordsize=128K {{ zfs_pool_name }}/photos"
  changed_when: false

- name: Install monthly scrub cron
  ansible.builtin.copy:
    dest: /etc/cron.d/zfs-scrub
    content: |
      0 3 1 * * root /sbin/zpool scrub {{ zfs_pool_name }}
    mode: "0644"
