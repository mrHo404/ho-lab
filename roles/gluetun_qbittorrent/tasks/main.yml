---
- name: Create Gluetun compose directory
  ansible.builtin.file:
    path: "{{ ho_lab_compose_root }}/gluetun-qbittorrent"
    state: directory
    owner: "{{ ho_lab_uid }}"
    group: "{{ ho_lab_gid }}"
    mode: "0755"

- name: Create downloads directory
  ansible.builtin.file:
    path: "{{ gluetun.downloads_path }}"
    state: directory
    owner: "{{ ho_lab_uid }}"
    group: "{{ ho_lab_gid }}"
    mode: "0755"

- name: Template Gluetun + qBittorrent docker-compose
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ ho_lab_compose_root }}/gluetun-qbittorrent/docker-compose.yml"
    owner: "{{ ho_lab_uid }}"
    group: "{{ ho_lab_gid }}"
    mode: "0644"
  notify: Restart gluetun stack

- name: Template Gluetun .env
  ansible.builtin.template:
    src: env.j2
    dest: "{{ ho_lab_compose_root }}/gluetun-qbittorrent/.env"
    owner: "{{ ho_lab_uid }}"
    group: "{{ ho_lab_gid }}"
    mode: "0600"
  no_log: true

- name: Deploy Gluetun + qBittorrent stack
  community.docker.docker_compose_v2:
    project_src: "{{ ho_lab_compose_root }}/gluetun-qbittorrent"
    state: present
    pull: missing
    env_files:
      - "{{ ho_lab_compose_root }}/gluetun-qbittorrent/.env"

- name: Wait for Gluetun health
  ansible.builtin.command: docker inspect --format={{ '{{.State.Health.Status}}' }} gluetun
  register: gluetun_health
  retries: 30
  delay: 10
  until: gluetun_health.stdout == "healthy"
  changed_when: false
