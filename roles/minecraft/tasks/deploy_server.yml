---
- name: "Require RCON password in vault when RCON is enabled"
  ansible.builtin.assert:
    that:
      - vault_minecraft_rcon_password is defined
      - vault_minecraft_rcon_password | length > 0
      - vault_minecraft_rcon_password != 'CHANGE_ME'
    fail_msg: "Set vault_minecraft_rcon_password in vault.yml before enabling RCON"
  when: server.enable_rcon | default(false)

- name: "Create data directory for {{ server.name }}"
  ansible.builtin.file:
    path: "{{ minecraft.base_path }}/{{ server.name }}"
    state: directory
    owner: "{{ ho_lab_uid }}"
    group: "{{ ho_lab_gid }}"
    mode: "0755"

- name: "Create compose directory for {{ server.name }}"
  ansible.builtin.file:
    path: "{{ ho_lab_compose_root }}/minecraft/{{ server.name }}"
    state: directory
    owner: "{{ ho_lab_uid }}"
    group: "{{ ho_lab_gid }}"
    mode: "0755"

- name: "Template docker-compose for {{ server.name }}"
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ ho_lab_compose_root }}/minecraft/{{ server.name }}/docker-compose.yml"
    owner: "{{ ho_lab_uid }}"
    group: "{{ ho_lab_gid }}"
    mode: "0644"
  vars:
    mc: "{{ server }}"

- name: "Deploy {{ server.name }} stack"
  community.docker.docker_compose_v2:
    project_src: "{{ ho_lab_compose_root }}/minecraft/{{ server.name }}"
    state: present
    pull: missing

- name: "Wait for {{ server.name }} port"
  ansible.builtin.wait_for:
    port: "{{ server.port }}"
    host: 127.0.0.1
    delay: 10
    timeout: 600
  when: server.wait_for_ready | default(true)
